apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
  namespace: webapps
spec:
  type: LoadBalancer
  selector:
    app: demo-app
  ports:
    - protocol: TCP
      port: 80          # ✅ CHANGE THIS
      targetPort: 5000  # ✅ your Flask app
